<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}UENote{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #1e293b;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background-color: #334155;
        }

        .card {
            background-color: #1e293b;
            border: none;
            color: #f8fafc;
        }

        .btn-gradient {
            background: linear-gradient(45deg, #6366f1, #22d3ee);
            border: none;
        }

        .btn-gradient-side {
            background: linear-gradient(45deg, #5457e6, #8a48b6);
            border: none;
        }

        .btn-gradient:hover {
            opacity: 0.9;
        }

    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h4 class="fw-bold mb-4">UENote</h4>
            {%if current_page=='dashboard'%}
            <a href="/dashboard" class="btn-gradient-side text-white">Dashboard</a>
            {%else%}
            <a href="/dashboard">Dashboard</a>
            {%endif%}
            {%if current_page=='projects'%}
            <a href="/projects" class="btn-gradient-side text-white">Projects</a>
            {%else%}
            <a href="/projects">Projects</a>
            {%endif%}
            <a href="#">Settings</a>
            <a href="#">Logout</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
