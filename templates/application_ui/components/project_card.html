<div class="card h-100 p-3">

    <h5 class="fw-bold">{{ project.title }}</h5>

    <p class="text-secondary small">
        {{ project.description or "No description provided." }}
    </p>

    <div class="mt-auto d-flex justify-content-between">

        <a href="/project/{{ project.id }}" class="btn btn-sm btn-outline-light">
            Open
        </a>

        <div>
            <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal"
            data-bs-target="#editProjectModal{{ project.id }}">
            Edit
            </button>

            <a href="/project/delete/{{ project.id }}"
               class="btn btn-sm btn-outline-danger"
               onclick="return confirm('Delete this project?');">
                Delete
            </a>
        </div>

    </div>
</div>


<!-- Edit Project Modal -->
<div class="modal fade" id="editProjectModal{{ project.id }}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header border-0">
                <h5 class="modal-title">Edit Project</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form method="POST" action="/project/edit/{{ project.id }}">
                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Project Title</label>
                        <input type="text"
                               name="new_title"
                               value="{{ project.title }}"
                               class="form-control bg-secondary text-white"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="new_description"
                                  class="form-control bg-secondary text-white"
                                  rows="3">{{ project.description }}</textarea>
                    </div>

                </div>

                <div class="modal-footer border-0">
                    <button type="submit" class="btn btn-warning">
                        Save Changes
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>
